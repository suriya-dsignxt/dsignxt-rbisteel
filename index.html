<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBI Steel Structure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background-color: #0b0c10; /* Premium dark background */
        }
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;

        }

</head>
<body>
    <img src="RBI Steel Structure Landing Page.jpg" alt="RBI Steel Structure Landing Page" class="landing-bg">
